paths:
  # Dossier où tu déposes tes cours (PDF, PPTX, MD, TXT)
  # Si tu utilises Syncthing, pointe vers le dossier synchronisé
  input_dir: "~/Sync/Cours"

  # Dossier où les .apkg seront écrits (synchronisé avec AnkiDroid via Syncthing)
  output_dir: "~/Sync/Flashcards"

  # Dossier LOCAL pour les exports .md et .csv (NON synchronisé — reste sur le PC)
  local_output_dir: "~/Desktop/flashcards"

  # Fichiers d'état (ne pas modifier)
  state_file: "~/.local/share/flashcard-pipeline/processed_files.json"
  themes_file: "~/.local/share/flashcard-pipeline/themes.json"

infercom:
  base_url: "https://api.infercom.ai/v1"
  analyst_model: "gpt-oss-120b"      # analyse des cours
  aggregator_model: "gemma-4-31B-it" # fusion des thèmes (tâche légère)
  builder_model: "gpt-oss-120b"      # génération des flashcards
  embed_model: "E5-Mistral-7B-Instruct" # embeddings pour dédup sémantique

pipeline:
  supported_extensions: [".pdf", ".pptx", ".ppt", ".md", ".txt"]
  max_parallel_files: 5   # fichiers analysés en parallèle
  max_parallel_themes: 5  # thèmes traités en parallèle

ocr:
  # OCR automatique des PDF scannés (aucune couche texte, pas de sidecar .ocr.md).
  # Nécessite GEMINI_API_KEY. Si absent : le fichier est signalé, jamais traité en silence.
  enabled: true
  provider: "gemini"
  model: "gemini-3.5-flash"  # GA, multimodal, 1M tokens d'entrée
  dpi: 200
  batch_pages: 20   # pages par requête — la taille du payload borne, pas le contexte
  max_pages: 400    # garde-fou coût : au-delà, on signale au lieu d'OCRiser
